services:
  psicometrics-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=
      - SECRET_KEY=change-me-in-production
      - ALLOWED_ORIGINS=["http://localhost:3000"]
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - psicometrics-network
    restart: unless-stopped

  psicometrics-web:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - psicometrics-api
    networks:
      - psicometrics-network
    restart: unless-stopped

networks:
  psicometrics-network:
    driver: bridge
